version: "3.8"

services:
  watcher:
    build: .
    container_name: iran-israel-watcher
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist state across restarts (dedup hashes, threat level, seen messages)
      - watcher-state:/app/state
      # Optional: mount your own config.json instead of using env vars
      # - ./config.json:/app/config.json:ro
      # Optional: mount secrets directory
      # - ./secrets:/app/secrets:ro
    # Healthcheck: verify watcher log is being written
    healthcheck:
      test: ["CMD", "bash", "-c", "find /app/state/watcher.log -mmin -5 | grep -q ."]
      interval: 5m
      timeout: 10s
      retries: 3

volumes:
  watcher-state:

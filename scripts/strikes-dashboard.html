<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ MAGEN YEHUDA — Theater Operations</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --panel: rgba(8, 12, 22, 0.94);
    --border: rgba(0, 200, 255, 0.12);
    --accent: #00d4ff;
    --israel: #0099ff;
    --iran: #ff2222;
    --proxy: #ff8800;
    --syria: #777;
    --us: #3355cc;
    --gulf: #00cc66;
    --unknown: #555;
    --critical: #ff0040;
    --warning: #ffaa00;
    --safe: #00ff88;
    --text: #c0c8d8;
    --text-dim: #506080;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    height: 100vh;
  }

  /* ══ SCANLINES ══ */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,180,255,0.012) 2px, rgba(0,180,255,0.012) 4px);
    pointer-events: none;
    z-index: 10000;
  }

  /* ══ TOP HUD ══ */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    background: linear-gradient(180deg, rgba(6,10,18,0.97), rgba(6,10,18,0.85));
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 1000;
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hud-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat { font-size: 10px; color: var(--text-dim); }
  .stat b {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    margin-left: 4px;
  }
  .stat b.cyan { color: var(--accent); }
  .stat b.red { color: var(--critical); }

  .threat-badge {
    padding: 3px 10px;
    border: 1px solid var(--critical);
    border-radius: 3px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--critical);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 8px rgba(255,0,64,0.2); }
    50% { box-shadow: 0 0 20px rgba(255,0,64,0.5); }
  }

  .clock {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* ══ MAP ══ */
  #map {
    position: fixed;
    top: 44px; left: 0;
    right: 340px;
    bottom: 170px;
    z-index: 1;
  }

  /* Dark leaflet overrides */
  .leaflet-container { background: #080c14 !important; }
  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--accent) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-attribution { display: none !important; }

  /* ══ RIGHT PANEL ══ */
  #panel {
    position: fixed;
    top: 44px; right: 0;
    width: 340px; bottom: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    z-index: 500;
  }

  .section {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .section-title::before { content: '▸ '; }

  /* Theater buttons */
  .theater-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }

  .theater-btn {
    background: rgba(0,200,255,0.06);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .theater-btn:hover, .theater-btn.active {
    background: rgba(0,200,255,0.18);
    color: var(--accent);
    border-color: var(--accent);
  }
  .theater-btn.active {
    box-shadow: 0 0 10px rgba(0,200,255,0.2);
  }

  /* Force bars */
  .force-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
    font-size: 10px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    transition: background 0.15s;
  }
  .force-row:hover { background: rgba(255,255,255,0.04); }
  .force-row.dimmed { opacity: 0.3; }

  .force-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .force-name { flex: 1; color: var(--text-dim); }
  .force-count {
    font-family: 'Orbitron', sans-serif;
    font-weight: 500;
    font-size: 10px;
    min-width: 45px;
    text-align: right;
  }
  .force-bar-bg {
    width: 50px; height: 3px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    overflow: hidden;
  }
  .force-bar-fill { height: 100%; border-radius: 2px; }

  /* Country grid */
  .country-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
  }
  .country-cell {
    background: rgba(255,255,255,0.02);
    padding: 5px 7px;
    border-radius: 3px;
    font-size: 10px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .country-cell:hover { background: rgba(0,200,255,0.08); }
  .country-cell.active { background: rgba(0,200,255,0.15); border: 1px solid var(--accent); }
  .country-n {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: var(--accent);
  }

  /* Kill feed */
  .feed-item {
    font-size: 9px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.02);
    line-height: 1.3;
  }
  .feed-ts { color: var(--text-dim); }
  .feed-loc { color: var(--accent); }
  .feed-fat { color: var(--critical); font-weight: 700; }

  /* Key sites panel */
  .site-tag {
    display: inline-block;
    background: rgba(255,0,64,0.1);
    border: 1px solid rgba(255,0,64,0.2);
    border-radius: 3px;
    padding: 2px 7px;
    font-size: 9px;
    margin: 2px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-dim);
  }
  .site-tag:hover {
    background: rgba(255,0,64,0.25);
    color: var(--critical);
    border-color: var(--critical);
  }

  /* ══ BOTTOM TIMELINE ══ */
  #timeline-panel {
    position: fixed;
    left: 0;
    right: 340px;
    bottom: 0;
    height: 170px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    z-index: 500;
  }

  .timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .timeline-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .timeline-range {
    font-size: 9px;
    color: var(--text-dim);
  }

  #timeline-canvas {
    width: 100%;
    height: 130px;
    cursor: crosshair;
  }

  /* Custom popups */
  .leaflet-popup-content-wrapper {
    background: rgba(8,12,22,0.95) !important;
    color: var(--text) !important;
    border: 1px solid var(--accent) !important;
    border-radius: 4px !important;
    box-shadow: 0 0 30px rgba(0,200,255,0.15) !important;
    font-family: 'JetBrains Mono', monospace !important;
    backdrop-filter: blur(10px);
  }
  .leaflet-popup-tip { background: rgba(8,12,22,0.95) !important; border-color: var(--accent) !important; }
  .leaflet-popup-content { font-size: 11px !important; margin: 10px !important; }
  .popup-title { font-family: 'Orbitron'; font-size: 12px; color: #fff; margin-bottom: 4px; }
  .popup-date { color: var(--text-dim); font-size: 9px; }
  .popup-type { color: var(--warning); margin-top: 3px; }
  .popup-actors { margin-top: 3px; }
  .popup-fat { color: var(--critical); font-weight: 700; margin-top: 3px; }
  .popup-notes { color: var(--text-dim); font-size: 9px; margin-top: 5px; max-width: 250px; }

  /* Responsive */
  @media (max-width: 900px) {
    #panel { display: none; }
    #map { right: 0; }
    #timeline-panel { right: 0; }
  }
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="logo">⚔️ MAGEN YEHUDA — THEATER OPS</div>
  <div class="hud-stats">
    <div class="stat">EVENTS <b class="cyan" id="s-events">—</b></div>
    <div class="stat">KIA <b class="red" id="s-kia">—</b></div>
    <div class="stat">THEATERS <b class="cyan" id="s-countries">—</b></div>
    <div class="threat-badge">● ACTIVE CONFLICT</div>
    <div class="clock" id="clock">—</div>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- RIGHT PANEL -->
<div id="panel">
  <div class="section">
    <div class="section-title">THEATER SELECT</div>
    <div class="theater-btns" id="theater-btns"></div>
  </div>
  <div class="section">
    <div class="section-title">FORCE DISPOSITION</div>
    <div id="forces"></div>
  </div>
  <div class="section">
    <div class="section-title">THEATER BREAKDOWN</div>
    <div id="countries" class="country-grid"></div>
  </div>
  <div class="section">
    <div class="section-title">🎯 KEY SITES — IRAN</div>
    <div id="iran-sites"></div>
  </div>
  <div class="section">
    <div class="section-title">EVENT TYPES</div>
    <div id="event-types"></div>
  </div>
  <div class="section">
    <div class="section-title">LIVE INTEL FEED</div>
    <div id="feed"></div>
  </div>
</div>

<!-- TIMELINE -->
<div id="timeline-panel">
  <div class="timeline-header">
    <div class="timeline-title">▸ TEMPORAL DENSITY — DAILY EVENTS</div>
    <div class="timeline-range" id="tl-range">—</div>
  </div>
  <canvas id="timeline-canvas"></canvas>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG & CONSTANTS
// ═══════════════════════════════════════════════════════════
const SIDE_COLORS = {
  israel:'#0099ff', iran:'#ff2222', iran_proxy:'#ff8800',
  syria:'#777', us:'#3355cc', gulf:'#00cc66', unknown:'#555'
};
const SIDE_NAMES = {
  israel:'ISRAEL (IDF)', iran:'IRAN (IRGC)', iran_proxy:'IRAN PROXIES',
  syria:'SYRIA (SAA)', us:'USA (CENTCOM)', gulf:'GULF STATES', unknown:'UNATTRIBUTED'
};
const COUNTRY_FLAGS = {
  Palestine:'🇵🇸', Israel:'🇮🇱', Lebanon:'🇱🇧', Syria:'🇸🇾',
  Iraq:'🇮🇶', Yemen:'🇾🇪', Iran:'🇮🇷', Jordan:'🇯🇴', 'Saudi Arabia':'🇸🇦'
};

// Theater presets (zoom views)
const THEATERS = {
  'ALL': { center: [30, 46], zoom: 5 },
  '🇮🇷 IRAN': { center: [32.5, 53], zoom: 6 },
  '🇮🇱🇵🇸 ISRAEL/GAZA': { center: [31.5, 34.8], zoom: 8 },
  '🇱🇧 LEBANON': { center: [33.8, 35.8], zoom: 9 },
  '🇸🇾 SYRIA': { center: [35, 38.5], zoom: 7 },
  '🇮🇶 IRAQ': { center: [33.5, 44], zoom: 6 },
  '🇾🇪 YEMEN': { center: [15.5, 44], zoom: 7 },
  '🔴 RED SEA': { center: [18, 40], zoom: 6 },
};

// Key sites in Iran (nuclear, military, strategic)
const IRAN_SITES = [
  { name: 'Natanz', lat: 33.72, lon: 51.73, type: 'Nuclear enrichment' },
  { name: 'Isfahan', lat: 32.65, lon: 51.68, type: 'Nuclear conversion' },
  { name: 'Fordow', lat: 34.88, lon: 51.58, type: 'Underground enrichment' },
  { name: 'Bushehr', lat: 28.97, lon: 50.84, type: 'Nuclear reactor' },
  { name: 'Arak', lat: 34.09, lon: 49.70, type: 'Heavy water reactor' },
  { name: 'Parchin', lat: 35.52, lon: 51.77, type: 'Military complex' },
  { name: 'Tehran', lat: 35.69, lon: 51.39, type: 'Capital / Command' },
  { name: 'Bandar Abbas', lat: 27.19, lon: 56.28, type: 'Naval base / Hormuz' },
  { name: 'Chabahar', lat: 25.29, lon: 60.64, type: 'Naval / Port' },
  { name: 'Kharg Island', lat: 29.24, lon: 50.33, type: 'Oil terminal (90% exports)' },
  { name: 'Tabriz', lat: 38.08, lon: 46.29, type: 'Military base' },
  { name: 'Dezful', lat: 32.38, lon: 48.40, type: 'Missile base' },
  { name: 'Semnan', lat: 35.57, lon: 53.39, type: 'Space/missile launch' },
  { name: 'Kish Island', lat: 26.53, lon: 54.02, type: 'Strategic island' },
];

let map, markerLayer, siteLayer;
let EVENTS = [];
let filteredEvents = [];
let activeSides = new Set(['israel','iran','iran_proxy','syria','us','gulf','unknown']);
let activeCountry = null;

// ═══════════════════════════════════════════════════════════
// INIT MAP
// ═══════════════════════════════════════════════════════════
function initMap() {
  map = L.map('map', {
    center: [30, 46],
    zoom: 5,
    zoomControl: true,
    preferCanvas: true,
  });

  // Dark military tile layer
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    maxZoom: 18,
    opacity: 0.7,
  }).addTo(map);

  // Labels layer (separate, on top)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
    maxZoom: 18,
    opacity: 0.5,
  }).addTo(map);

  markerLayer = L.layerGroup().addTo(map);
  siteLayer = L.layerGroup().addTo(map);
}

// ═══════════════════════════════════════════════════════════
// RENDER MARKERS
// ═══════════════════════════════════════════════════════════
function renderMarkers() {
  markerLayer.clearLayers();

  const now = Date.now();
  const cutoff48h = new Date(now - 48*3600*1000).toISOString().substring(0,10);

  for (const ev of filteredEvents) {
    if (!activeSides.has(ev.side)) continue;
    if (activeCountry && ev.country !== activeCountry) continue;

    const color = SIDE_COLORS[ev.side] || SIDE_COLORS.unknown;
    const fat = ev.fatalities || 0;
    const radius = Math.max(2, Math.min(2.5 + Math.sqrt(fat) * 0.7, 16));
    const isRecent = ev.date >= cutoff48h;
    const opacity = ev.confidence === 'h' ? 0.85 : ev.confidence === 'm' ? 0.6 : 0.35;

    const marker = L.circleMarker([ev.lat, ev.lon], {
      radius: radius,
      fillColor: color,
      fillOpacity: opacity,
      color: isRecent ? '#ffff00' : color,
      weight: isRecent ? 2 : 0.5,
      opacity: isRecent ? 0.9 : 0.4,
    });

    // Popup
    marker.bindPopup(`
      <div class="popup-title">📍 ${ev.location || ev.country || 'Unknown'}</div>
      <div class="popup-date">📅 ${ev.date}</div>
      <div class="popup-type">⚡ ${ev.sub_event_type || ''}</div>
      <div class="popup-actors">
        <span style="color:${color}">${ev.actor1 || ev.side.toUpperCase()}</span>
        ${ev.actor2 ? ' ⚔️ ' + ev.actor2 : ''}
      </div>
      ${fat > 0 ? `<div class="popup-fat">☠ ${fat} fatalities</div>` : ''}
      ${ev.notes ? `<div class="popup-notes">${ev.notes}</div>` : ''}
    `, { maxWidth: 300 });

    markerLayer.addLayer(marker);
  }

  // Iran key sites (always visible)
  siteLayer.clearLayers();
  if (map.getZoom() >= 6) {
    for (const site of IRAN_SITES) {
      // Check if there are events near this site
      const nearby = filteredEvents.filter(e =>
        Math.abs(e.lat - site.lat) < 0.5 && Math.abs(e.lon - site.lon) < 0.5
      ).length;

      const icon = L.divIcon({
        className: '',
        html: `<div style="
          font-family:'JetBrains Mono';font-size:8px;color:${nearby > 0 ? '#ff4444' : '#00d4ff'};
          text-shadow:0 0 6px ${nearby > 0 ? 'rgba(255,0,0,0.5)' : 'rgba(0,200,255,0.3)'};
          white-space:nowrap;pointer-events:none;transform:translate(-50%,-100%);
        ">
          ${nearby > 0 ? '⚠' : '◆'} ${site.name}
          ${nearby > 0 ? `<span style="color:#ff4444">[${nearby}]</span>` : ''}
        </div>`,
        iconSize: [0, 0],
      });

      const siteMarker = L.marker([site.lat, site.lon], { icon, interactive: true });
      siteMarker.bindPopup(`
        <div class="popup-title">🎯 ${site.name}</div>
        <div class="popup-type">${site.type}</div>
        <div style="margin-top:4px;font-size:10px;">
          Events nearby: <b style="color:${nearby > 0 ? '#ff4444' : '#00d4ff'}">${nearby}</b>
        </div>
        <div class="popup-date">${site.lat.toFixed(2)}°N ${site.lon.toFixed(2)}°E</div>
      `);
      siteLayer.addLayer(siteMarker);
    }
  }

  updateStats();
}

// ═══════════════════════════════════════════════════════════
// FILTER & PANELS
// ═══════════════════════════════════════════════════════════
function applyFilter() {
  filteredEvents = EVENTS.filter(e => {
    if (!activeSides.has(e.side)) return false;
    if (activeCountry && e.country !== activeCountry) return false;
    return true;
  });
  renderMarkers();
  drawTimeline();
  renderFeed();
}

function updateStats() {
  const visible = filteredEvents.filter(e => activeSides.has(e.side) && (!activeCountry || e.country === activeCountry));
  document.getElementById('s-events').textContent = visible.length.toLocaleString();
  document.getElementById('s-kia').textContent = visible.reduce((s,e) => s + (e.fatalities||0), 0).toLocaleString();
  document.getElementById('s-countries').textContent = new Set(visible.map(e => e.country).filter(Boolean)).size;
}

function renderForces() {
  const counts = {};
  for (const e of EVENTS) counts[e.side] = (counts[e.side]||0) + 1;
  const max = Math.max(...Object.values(counts));

  document.getElementById('forces').innerHTML = Object.entries(counts)
    .sort((a,b) => b[1]-a[1])
    .map(([side, count]) => {
      const dimmed = !activeSides.has(side) ? 'dimmed' : '';
      return `<div class="force-row ${dimmed}" data-side="${side}">
        <div class="force-dot" style="background:${SIDE_COLORS[side]||'#555'}"></div>
        <span class="force-name">${SIDE_NAMES[side]||side}</span>
        <span class="force-count" style="color:${SIDE_COLORS[side]||'#888'}">${count.toLocaleString()}</span>
        <div class="force-bar-bg">
          <div class="force-bar-fill" style="width:${(count/max*100).toFixed(0)}%;background:${SIDE_COLORS[side]||'#555'}"></div>
        </div>
      </div>`;
    }).join('');

  // Click to toggle
  document.querySelectorAll('.force-row').forEach(row => {
    row.addEventListener('click', () => {
      const side = row.dataset.side;
      if (activeSides.has(side)) activeSides.delete(side);
      else activeSides.add(side);
      row.classList.toggle('dimmed', !activeSides.has(side));
      applyFilter();
    });
  });
}

function renderCountries() {
  const counts = {};
  for (const e of EVENTS) if (e.country) counts[e.country] = (counts[e.country]||0) + 1;

  document.getElementById('countries').innerHTML = Object.entries(counts)
    .sort((a,b) => b[1]-a[1])
    .map(([country, count]) => {
      const active = activeCountry === country ? 'active' : '';
      return `<div class="country-cell ${active}" data-country="${country}">
        <span>${COUNTRY_FLAGS[country]||'🌍'} ${country}</span>
        <span class="country-n">${count.toLocaleString()}</span>
      </div>`;
    }).join('');

  document.querySelectorAll('.country-cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const c = cell.dataset.country;
      activeCountry = activeCountry === c ? null : c;
      document.querySelectorAll('.country-cell').forEach(x => x.classList.remove('active'));
      if (activeCountry) cell.classList.add('active');
      applyFilter();
    });
  });
}

function renderIranSites() {
  document.getElementById('iran-sites').innerHTML = IRAN_SITES.map(s => {
    const nearby = EVENTS.filter(e =>
      Math.abs(e.lat - s.lat) < 0.5 && Math.abs(e.lon - s.lon) < 0.5
    ).length;
    const hot = nearby > 0;
    return `<span class="site-tag" data-lat="${s.lat}" data-lon="${s.lon}"
      style="${hot ? 'background:rgba(255,0,64,0.2);color:#ff4444;border-color:rgba(255,0,64,0.4)' : ''}"
      title="${s.type} — ${nearby} events nearby">
      ${hot ? '🔥' : '◆'} ${s.name} ${hot ? `(${nearby})` : ''}
    </span>`;
  }).join('');

  document.querySelectorAll('.site-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      map.flyTo([+tag.dataset.lat, +tag.dataset.lon], 10, { duration: 1 });
    });
  });
}

function renderEventTypes() {
  const types = {};
  for (const e of EVENTS) {
    const t = e.sub_event_type || 'Other';
    types[t] = (types[t]||0) + 1;
  }
  const max = Math.max(...Object.values(types));

  document.getElementById('event-types').innerHTML = Object.entries(types)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 8)
    .map(([type, count]) => `
      <div class="force-row">
        <span class="force-name" style="font-size:9px">${type}</span>
        <span class="force-count" style="color:var(--warning)">${count.toLocaleString()}</span>
        <div class="force-bar-bg">
          <div class="force-bar-fill" style="width:${(count/max*100).toFixed(0)}%;background:var(--warning)"></div>
        </div>
      </div>
    `).join('');
}

function renderTheaters() {
  document.getElementById('theater-btns').innerHTML = Object.keys(THEATERS).map(name =>
    `<button class="theater-btn${name === 'ALL' ? ' active' : ''}" data-theater="${name}">${name}</button>`
  ).join('');

  document.querySelectorAll('.theater-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const t = THEATERS[btn.dataset.theater];
      map.flyTo(t.center, t.zoom, { duration: 1.2 });
      document.querySelectorAll('.theater-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

function renderFeed() {
  const recent = filteredEvents
    .filter(e => e.fatalities > 0 && e.location)
    .slice(0, 15);

  document.getElementById('feed').innerHTML = recent.map(ev => {
    const color = SIDE_COLORS[ev.side] || '#888';
    return `<div class="feed-item">
      <span class="feed-ts">${ev.date}</span>
      <span style="color:${color}">${ev.actor1 || ev.side.toUpperCase()}</span>
      → <span class="feed-loc">${ev.location || ev.country}</span>
      ${ev.fatalities > 0 ? `<span class="feed-fat">☠${ev.fatalities}</span>` : ''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// TIMELINE
// ═══════════════════════════════════════════════════════════
function drawTimeline() {
  const canvas = document.getElementById('timeline-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width = canvas.parentElement.clientWidth * dpr;
  const H = canvas.height = 130 * dpr;
  canvas.style.width = canvas.parentElement.clientWidth + 'px';
  canvas.style.height = '130px';
  ctx.clearRect(0, 0, W, H);

  const dayMap = {};
  const daySideMap = {};
  for (const ev of filteredEvents) {
    if (!ev.date) continue;
    dayMap[ev.date] = (dayMap[ev.date]||0) + 1;
    if (!daySideMap[ev.date]) daySideMap[ev.date] = {};
    daySideMap[ev.date][ev.side] = (daySideMap[ev.date][ev.side]||0) + 1;
  }

  const days = Object.keys(dayMap).sort();
  if (!days.length) return;

  document.getElementById('tl-range').textContent = `${days[0]} → ${days[days.length-1]} (${days.length} days)`;

  const maxCount = Math.max(...Object.values(dayMap));
  const pad = 30 * dpr;
  const barW = Math.max(1, (W - pad*2) / days.length);
  const chartH = H - 25 * dpr;

  const stackOrder = ['israel','iran_proxy','unknown','syria','iran','us','gulf'];

  for (let i = 0; i < days.length; i++) {
    const x = pad + i * barW;
    const sides = daySideMap[days[i]] || {};
    let yOff = 0;

    for (const side of stackOrder) {
      const count = sides[side] || 0;
      if (!count) continue;
      const h = (count / maxCount) * chartH;
      ctx.fillStyle = SIDE_COLORS[side] || '#555';
      ctx.globalAlpha = 0.75;
      ctx.fillRect(x, chartH - yOff - h, Math.max(barW - 0.3, 0.5), h);
      yOff += h;
    }
  }
  ctx.globalAlpha = 1;

  // Labels
  ctx.font = `${8*dpr}px 'JetBrains Mono'`;
  ctx.fillStyle = 'rgba(100,130,180,0.4)';
  ctx.textAlign = 'center';
  const labelEvery = Math.max(1, Math.floor(days.length / 14));
  for (let i = 0; i < days.length; i += labelEvery) {
    const x = pad + i * barW + barW/2;
    ctx.fillText(days[i].substring(2,10), x, H - 2*dpr);
  }
  ctx.textAlign = 'right';
  ctx.fillText(maxCount.toString(), pad - 4*dpr, 12*dpr);
}

// ═══════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toISOString().replace('T',' ').substring(0,19) + ' UTC';
}, 1000);

// ═══════════════════════════════════════════════════════════
// DATA LOAD & INIT
// ═══════════════════════════════════════════════════════════
function loadData() {
  const C = COMPACT_DATA;
  const baseDate = new Date(C.base);
  EVENTS = C.rows.map(r => {
    const d = new Date(baseDate.getTime() + r[0] * 86400000);
    return {
      date: d.toISOString().substring(0,10),
      lat: r[1]/1000, lon: r[2]/1000,
      country: C.countries[r[3]] || '',
      location: '', // compact format
      sub_event_type: C.subtypes[r[6]] || '',
      event_type: C.subtypes[r[6]] || '',
      side: C.sides[r[4]] || 'unknown',
      actor1: (C.sides[r[4]]||'unknown').toUpperCase(),
      actor2: '',
      fatalities: r[5],
      confidence: 'm',
      notes: '',
    };
  });
  filteredEvents = [...EVENTS];
}

window.addEventListener('load', () => {
  loadData();
  initMap();
  renderMarkers();
  renderForces();
  renderCountries();
  renderIranSites();
  renderEventTypes();
  renderTheaters();
  renderFeed();
  drawTimeline();
  updateStats();

  map.on('zoomend moveend', () => {
    // Re-render site labels based on zoom
    renderMarkers();
  });

  window.addEventListener('resize', drawTimeline);

  // Auto-fly to Iran theater after 2s
  setTimeout(() => {
    map.flyTo([32.5, 53], 6, { duration: 2 });
  }, 2000);
});
</script>
